version: 2
updates:
  # npm packages (Next.js, Prisma, all node_modules)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    reviewers:
      - "CHC-Alex"
    labels:
      - "dependabot"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Bundle all minor/patch updates for non-critical packages together
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions (if you add any CI workflows later)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/New_York"
    reviewers:
      - "CHC-Alex"
    labels:
      - "dependabot"
